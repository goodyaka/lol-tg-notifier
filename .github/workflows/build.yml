name: Сборка Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:   # можно запустить вручную из вкладки Actions

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Собрать .exe
        run: pyinstaller --onefile --noconsole --name "LoL-TG-Notifier" notifier.py

      - name: Выложить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: LoL-TG-Notifier
          path: dist/LoL-TG-Notifier.exe
