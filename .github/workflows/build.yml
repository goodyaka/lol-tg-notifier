name: Сборка Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:   # можно запустить вручную из вкладки Actions

permissions:
  contents: write       # нужно, чтобы публиковать Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Вшить токен из секрета
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          printf "TOKEN = '%s'\n" "$BOT_TOKEN" > _embedded.py
          echo "Файл _embedded.py создан (значение скрыто)."

      - name: Собрать .exe
        run: pyinstaller --onefile --noconsole --name "LoL-TG-Notifier" --hidden-import _embedded --collect-all webview --icon assets/cat_icon.ico --version-file version_info.txt --add-data "assets;assets" notifier.py

      - name: Выложить артефакт (для отладки)
        uses: actions/upload-artifact@v4
        with:
          name: LoL-TG-Notifier
          path: dist/LoL-TG-Notifier.exe

      - name: Опубликовать Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: LoL → Telegram Notifier v${{ github.run_number }}
          body: |
            Автоматическая сборка из коммита ${{ github.sha }}.

            **Скачать:** файл `LoL-TG-Notifier.exe` ниже.
            Постоянная ссылка на последнюю версию:
            https://github.com/${{ github.repository }}/releases/latest/download/LoL-TG-Notifier.exe
          files: dist/LoL-TG-Notifier.exe
